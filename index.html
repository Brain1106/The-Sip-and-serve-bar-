<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sip & Serve Manager</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none !important; }
        .gradient-bg { background: linear-gradient(135deg, #ff9d6c 0%, #bb4e75 100%); }
    </style>
</head>
<body class="gradient-bg min-h-screen font-sans text-gray-900">
    <div id="app" v-cloak class="max-w-md mx-auto p-4">
        
        <header class="text-white text-center py-6">
            <h1 class="text-3xl font-black tracking-tight">SIP & SERVE</h1>
            <p class="opacity-80">Bar Inventory Manager</p>
        </header>

        <div v-if="view === 'home'" class="grid grid-cols-1 gap-4 mt-4">
            <button @click="view = 'inventory'" class="bg-white/20 backdrop-blur-md text-white p-6 rounded-2xl border border-white/30 shadow-xl flex items-center justify-between">
                <span class="text-xl font-bold">Check Inventory</span>
                <span class="text-2xl">📋</span>
            </button>
            <button @click="view = 'sales'" class="bg-white/20 backdrop-blur-md text-white p-6 rounded-2xl border border-white/30 shadow-xl flex items-center justify-between">
                <span class="text-xl font-bold">New Sale</span>
                <span class="text-2xl">💰</span>
            </button>
        </div>

        <div v-if="view === 'inventory'" class="bg-white rounded-3xl p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Inventory</h2>
                <button @click="view = 'home'" class="text-gray-400">✕ Close</button>
            </div>
            <p class="text-gray-500 italic">Your stock list will appear here shortly...</p>
        </div>

        <div v-if="view === 'sales'" class="bg-white rounded-3xl p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">New Sale</h2>
                <button @click="view = 'home'" class="text-gray-400">✕ Close</button>
            </div>
            <p class="text-gray-500 italic">Select a drink to record a sale...</p>
        </div>

    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    view: 'home'
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
